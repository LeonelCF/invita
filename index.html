<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Invitación - Cumpleaños de Juan</title>

  <!-- Open Graph para WhatsApp -->
  <meta property="og:title" content="🎉 Estás invitado al cumpleaños de Juan" />
  <meta property="og:description" content="Sábado 12 de diciembre - 7:00 PM" />
  <meta property="og:image" content="https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?q=80&w=1200&auto=format&fit=crop" />
  <meta property="og:type" content="website" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      font-family: 'Poppins', sans-serif;
    }

    body {
      margin: 0;
      background: #0f172a;
      color: white;
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      text-align: center;
      padding: 30px;
      background:
        linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.75)),
        url('https://images.unsplash.com/photo-1513151233558-d860c5398176?q=80&w=1600&auto=format&fit=crop') center/cover;
    }

    .glass {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      padding: 40px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0,0,0,.4);
      animation: fadeUp 1s ease;
    }

    .badge-custom {
      background: #f59e0b;
      color: black;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 999px;
      display: inline-block;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 15px;
    }

    .subtitle {
      font-size: 1.2rem;
      opacity: .9;
      margin-bottom: 30px;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-top: 30px;
      margin-bottom: 35px;
    }

    .count-item {
      background: rgba(255,255,255,.1);
      border-radius: 18px;
      padding: 20px 10px;
    }

    .count-item h2 {
      margin: 0;
      font-size: 2rem;
      font-weight: 700;
    }

    .count-item span {
      opacity: .8;
      font-size: .9rem;
    }

    .btn-custom {
      border: none;
      padding: 15px 28px;
      border-radius: 14px;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
      transition: .3s;
      margin: 8px;
    }

    .btn-primary-custom {
      background: #22c55e;
      color: white;
    }

    .btn-primary-custom:hover {
      transform: translateY(-3px);
      background: #16a34a;
    }

    .btn-secondary-custom {
      background: white;
      color: black;
    }

    .btn-secondary-custom:hover {
      transform: translateY(-3px);
      background: #e5e7eb;
    }

    .info {
      margin-top: 30px;
      opacity: .9;
      line-height: 1.8;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media(max-width: 768px) {
      h1 {
        font-size: 2.2rem;
      }

      .countdown {
        grid-template-columns: repeat(2, 1fr);
      }

      .glass {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>

<section class="hero">
  <div class="glass">

    <div class="badge-custom">
      🎂 INVITACIÓN ESPECIAL
    </div>

    <h1>¡Cumpleaños de Juan!</h1>

    <p class="subtitle">
      Te espero para celebrar una noche inolvidable 🎉
    </p>

    <div class="countdown">
      <div class="count-item">
        <h2 id="days">00</h2>
        <span>Días</span>
      </div>

      <div class="count-item">
        <h2 id="hours">00</h2>
        <span>Horas</span>
      </div>

      <div class="count-item">
        <h2 id="minutes">00</h2>
        <span>Minutos</span>
      </div>

      <div class="count-item">
        <h2 id="seconds">00</h2>
        <span>Segundos</span>
      </div>
    </div>

    <a
      class="btn-custom btn-primary-custom"
      href="https://wa.me/51999999999?text=Hola%20Juan,%20confirmo%20mi%20asistencia"
      target="_blank"
    >
      Confirmar asistencia
    </a>

    <a
      class="btn-custom btn-secondary-custom"
      href="https://maps.google.com"
      target="_blank"
    >
      Ver ubicación
    </a>

    <div class="info">
      📅 Sábado 12 de diciembre<br>
      🕖 7:00 PM<br>
      📍 Chimbote, Perú
    </div>

  </div>
</section>

<script>
  const eventDate = new Date('2026-12-12T19:00:00').getTime();

  const updateCountdown = () => {
    const now = new Date().getTime();
    const distance = eventDate - now;

    if(distance < 0) return;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById('days').innerText = days;
    document.getElementById('hours').innerText = hours;
    document.getElementById('minutes').innerText = minutes;
    document.getElementById('seconds').innerText = seconds;
  };

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>

</body>
</html>
